name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources\ffmpeg
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .\ffmpeg-tmp -Force
          $exe = Get-ChildItem -Path .\ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item -Path $exe.FullName -Destination resources\ffmpeg\ffmpeg.exe
          Remove-Item -Recurse -Force .\ffmpeg-tmp
          Remove-Item -Force ffmpeg.zip

      - name: Seed database
        run: npm run seed

      - name: Build Next.js
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ielts-lingo-windows-installer
          path: dist/*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: IELTS Lingo ${{ github.ref_name }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
